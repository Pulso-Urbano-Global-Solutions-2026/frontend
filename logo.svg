    <rect x="26" y="122" width="12" height="50" rx="1" fill="url(#bgr)"></rect>
    <rect x="40" y="104" width="10" height="68" rx="1" fill="url(#bgr)"></rect>
    <rect x="52" y="114" width="11" height="58" rx="1" fill="url(#bgr)"></rect>
