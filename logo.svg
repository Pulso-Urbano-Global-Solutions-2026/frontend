      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  
  <rect width="200" height="200" rx="32" fill="#0a0e1a"></rect>

  
  <g clip-path="url(#hc)">
