<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <clipPath id="hc">
      <path d="M100 168C62 144 24 114 24 80C24 50 44 32 68 32C81 32 93 39 100 50C107 39 119 32 132 32C156 32 176 50 176 80C176 114 138 144 100 168Z"></path>
    </clipPath>
    <linearGradient id="bgr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ddc84" stop-opacity="0.9"></stop>
      <stop offset="60%" stop-color="#3ddc84" stop-opacity="0.5"></stop>
      <stop offset="100%" stop-color="#3ddc84" stop-opacity="0.12"></stop>
    </linearGradient>
    <linearGradient id="sgr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"></stop>
      <stop offset="100%" stop-color="#3ddc84"></stop>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
