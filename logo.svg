    <path d="M24 97 L50 97 L58 117 L75 53 L83 97 L100 97 L109 117 L126 53 L134 97 L176 97" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"></path>

    
